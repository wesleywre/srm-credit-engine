name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: srm
          POSTGRES_PASSWORD: srm
          POSTGRES_DB: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U srm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SRM_TEST_DATABASE_URL: postgresql+asyncpg://srm:srm@localhost:5432/srm_credit_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy
      - name: Tests
        run: uv run pytest -q

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint + prettier)
        run: |
          npm run lint
          npm run format:check
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npm run test
      - name: Build
        run: npm run build
