default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run mypy'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run --silent lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js)$
        pass_filenames: false

      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npm run --silent format:check'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: backend-unit-tests
        name: backend unit tests (pre-push)
        entry: bash -c 'cd backend && uv run pytest tests/unit -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
